<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Berita</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">Tambah Latest News</h2>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">
                    Judul Berita
                </label>

                <input type="text"
                       name="title"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Isi Berita
                </label>

                <textarea name="content"
                          class="form-control"
                          rows="5"
                          required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    URL Gambar
                </label>

                <input type="text"
                       name="image"
                       class="form-control"
                       placeholder="https://..."
                       required>
            </div>

            <button type="submit"
                    class="btn btn-primary">
                Simpan Berita
            </button>

            <a href="/"
               class="btn btn-secondary">
                Kembali
            </a>

        </form>

    </div>

</div>

</body>
</html>
